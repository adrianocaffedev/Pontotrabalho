    <title>PontoInteligente AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              slate: {
                850: '#1e293b',
                950: '#020617',
              }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        transition: background-color 0.3s ease;
      }
      
      html.dark body {
        background-color: #0f172a;
        color: #f1f5f9;
      }
      
      .ambient-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background: radial-gradient(circle at 15% 50%, rgba(238, 242, 255, 1), transparent 25%),
                    radial-gradient(circle at 85% 30%, rgba(245, 243, 255, 1), transparent 25%);
        background-color: #fafafa;
        transition: all 0.5s ease;
      }

      html.dark .ambient-bg {
        background: radial-gradient(circle at 15% 50%, rgba(30, 27, 75, 0.4), transparent 25%),
                    radial-gradient(circle at 85% 30%, rgba(49, 46, 129, 0.4), transparent 25%);
        background-color: #0f172a;
      }

      .blob {
        position: absolute;
        filter: blur(80px);
        opacity: 0.6;
        animation: float 20s infinite ease-in-out;
        z-index: -1;
        transition: opacity 0.5s ease;
      }

      html.dark .blob {
        opacity: 0.15;
      }

      .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #e0e7ff; animation-delay: 0s; }
      .blob-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: #f3e8ff; animation-delay: -5s; }
      .blob-3 { top: 40%; left: 40%; width: 30vw; height: 30vw; background: #fff1f2; opacity: 0.4; animation-delay: -10s; }
      
      html.dark .blob-1 { background: #4338ca; }
      html.dark .blob-2 { background: #581c87; }
      html.dark .blob-3 { background: #881337; }

      @keyframes float {
        0% { transform: translate(0, 0) rotate(0deg); }
        33% { transform: translate(30px, -50px) rotate(10deg); }
        66% { transform: translate(-20px, 20px) rotate(-5deg); }
        100% { transform: translate(0, 0) rotate(0deg); }
      }
      
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      html.dark ::-webkit-scrollbar-thumb { background: #334155; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      ::selection { background-color: rgba(99, 102, 241, 0.2); color: #4338ca; }
      html.dark ::selection { background-color: rgba(99, 102, 241, 0.4); color: #a5b4fc; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "vite": "https://aistudiocdn.com/vite@^7.2.4",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "@supabase/supabase-js": "https://aistudiocdn.com/@supabase/supabase-js@^2.86.2",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@3.8.2",
    "vite-plugin-pwa": "https://aistudiocdn.com/vite-plugin-pwa@^1.2.0"
  }
}
</script>
</head>
  <body>
    <div class="ambient-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
